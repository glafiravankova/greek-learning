<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить слова - Учиим греческий</title>
    <link rel="icon" type="image/png" href="/static/icons8-штанга-32.png">
    <link rel="shortcut icon" href="/static/icons8-штанга-32.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="main-header">
        <h1>
            <i class="fas fa-language"></i>
            Учим греческий
        </h1>
    </header>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-links">
                <a href="/dashboard"><i class="fas fa-home"></i> Главная</a>
                <a href="/practice"><i class="fas fa-dumbbell"></i> Тренировка</a>
                <a href="/add"><i class="fas fa-plus-circle"></i> Добавить</a>
                <a href="/dictionary"><i class="fas fa-book"></i> Словарь</a>
            </div>
            <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
        </div>
    </nav>

    <main class="content">
        <h1 class="page-title">
            <i class="fas fa-plus-circle"></i>
            Добавление новых слов
        </h1>
        
        <form method="post" id="wordForm">
            <div id="cards-container">
                <div class="add-word-card">
                    <h3><i class="fas fa-language"></i> Слово 1</h3>
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Термин (по-гречески):</label>
                        <input type="text" name="term[]" placeholder="π.χ. γάτα (например, кошка)" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-book"></i> Определение (перевод):</label>
                        <input type="text" name="definition[]" placeholder="кошка" required>
                    </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem; justify-content: center; margin: 2rem 0;">
                <button type="button" id="addCardBtn" class="btn btn-secondary">
                    <i class="fas fa-plus-circle"></i> Добавить еще слово
                </button>
                <button type="submit" class="btn">
                    <i class="fas fa-save"></i> Сохранить все
                </button>
            </div>
        </form>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p><i class="fas fa-heart" style="color: #ff6b6b;"></i> Μπράβο, ρε.</p>
        </div>
    </footer>

    <script>
        let cardCount = 1;
        document.getElementById('addCardBtn').addEventListener('click', function() {
            cardCount++;
            const container = document.getElementById('cards-container');
            const newCard = document.createElement('div');
            newCard.className = 'add-word-card';
            newCard.innerHTML = `
                <h3><i class="fas fa-language"></i> Слово ${cardCount}</h3>
                <div class="form-group">
                    <label><i class="fas fa-heading"></i> Термин (по-гречески):</label>
                    <input type="text" name="term[]" placeholder="π.χ. γάτα (например, кошка)" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-book"></i> Определение (перевод):</label>
                    <input type="text" name="definition[]" placeholder="кошка" required>
                </div>
            `;
            container.appendChild(newCard);
        });
    </script>
</body>
</html>
