<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Учим греческий</title>
    <link rel="icon" type="image/png" href="/static/icons8-штанга-32.png">
    <link rel="shortcut icon" href="/static/icons8-штанга-32.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="main-header">
        <h1>
            <i class="fas fa-language"></i>
            Учим греческий
        </h1>
    </header>

    <main class="content" style="max-width: 400px;">
        <h1 class="page-title" style="text-align: center;">
            <i class="fas fa-sign-in-alt"></i>
            Вход в систему
        </h1>
        
        {% if error %}
            <div style="background-color: #ffe6e6; color: #d63031; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border-left: 4px solid #d63031;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}
        
        <form method="post" style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08);">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Логин</label>
                <input type="text" name="username" required placeholder="Введите логин">
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" name="password" required placeholder="Введите пароль">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Войти
            </button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: #666; font-style: italic;">
            <i class="fas fa-info-circle"></i> Тестовый доступ: admin / admin
        </p>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p><i class="fas fa-heart" style="color: #ff6b6b;"></i> Μπράβο, ρε.</p>
        </div>
    </footer>
</body>
</html>
