<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренировка - Учим греческий</title>
    <!-- Favicon для вкладки -->
    <link rel="icon" type="image/png" sizes="32x32" href="static/icons8-штанга-32.png">
    <link rel="icon" type="image/png" sizes="64x64" href="static/icons8-штанга-64.png">
    <link rel="shortcut icon" href="static/icons8-штанга-32.png">
    
    <!-- Иконки для мобильных устройств -->
    <link rel="apple-touch-icon" href="static/icons8-штанга-64.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Учим греческий">
    <meta name="theme-color" content="#8b4513">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
    <style>
        /* Специфические стили только для страницы тренировки */
        .practice-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(139, 69, 19, 0.1);
        }
        
        .practice-prompt {
            font-size: 2rem;
            color: #8b4513;
            text-align: center;
            margin: 2rem 0;
            padding: 2rem;
            background: #f9f3ec;
            border-radius: 12px;
            font-family: 'Georgia', serif;
        }
        
        .practice-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            border: 2px solid #f0e6d6;
            border-radius: 8px;
            margin: 1rem 0;
            font-family: 'Georgia', serif;
        }
        
        .practice-input:focus {
            outline: none;
            border-color: #a05252;
        }
        
        .direction-badge {
            text-align: center;
            color: #8b4513;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        
        .note-hint {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin: 0.5rem 0;
            font-style: italic;
        }

        .result-block {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #f9f3ec;
            border-radius: 12px;
            text-align: center;
        }

        .result-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .correct {
            color: #2e7d32;
        }

        .incorrect {
            color: #c62828;
        }

        .answer-comparison {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            text-align: left;
        }

        .user-answer, .correct-answer {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-radius: 4px;
        }

        .user-answer {
            background: #fff3e0;
        }

        .correct-answer {
            background: #e8f5e9;
        }

        .btn {
            display: inline-block;
            background: #8b4513;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Georgia', serif;
            text-decoration: none;
            margin: 0.5rem;
        }

        .btn:hover {
            background: #a05252;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 69, 19, 0.2);
        }

        .btn-secondary {
            background: #f9f3ec;
            color: #8b4513;
            border: 1px solid #f0e6d6;
        }

        .btn-secondary:hover {
            background: #f0e6d6;
            color: #8b4513;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .progress-info {
            text-align: center;
            color: #666;
            margin-top: 1rem;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #8b4513;
            font-size: 1.2rem;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <h1>
            <i class="fas fa-language"></i>
            Учим греческий
        </h1>
    </header>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-links">
                <a href="dashboard.html"><i class="fas fa-home"></i> <span>Главная</span></a>
                <a href="dictionary.html"><i class="fas fa-book"></i> <span>Словарь</span></a>
                <a href="add.html"><i class="fas fa-plus-circle"></i> <span>Добавить</span></a>
                <a href="practice.html"><i class="fas fa-dumbbell"></i> <span>Тренировка</span></a>
            </div>
            <a href="index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>Выйти</span></a>
        </div>
    </nav>

    <main class="content">
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Загрузка тренировки...
        </div>

        <div id="practice-container" class="practice-container hidden">
            <!-- Блок вопроса -->
            <div id="question-block">
                <div class="direction-badge" id="direction-badge"></div>
                <div class="practice-prompt" id="prompt"></div>
                <form id="answer-form">
                    <input type="text" id="answer-input" class="practice-input" placeholder="Твой ответ..." autofocus required>
                    <div class="button-group">
                        <button type="submit" class="btn">Проверить</button>
                        <button type="button" id="skip-btn" class="btn btn-secondary">Пропустить</button>
                    </div>
                </form>
                <div class="note-hint">
                    <i class="fas fa-info-circle"></i> Текст в скобках не учитывается при проверке
                </div>
            </div>

            <!-- Блок результата -->
            <div id="result-block" class="result-block hidden">
                <div id="result-icon" class="result-icon"></div>
                <h2 id="result-title"></h2>
                <div class="answer-comparison">
                    <div id="prompt-word" class="prompt-word"></div>
                    <div id="user-answer" class="user-answer"></div>
                    <div id="correct-answer" class="correct-answer"></div>
                </div>
                <div class="button-group">
                    <button id="continue-btn" class="btn">Продолжить</button>
                </div>
                <div id="fix-button-container" class="button-group hidden">
                    <button id="fix-btn" class="btn btn-secondary">
                        <i class="fas fa-check"></i> Я ответил правильно
                    </button>
                </div>
                <div id="progress-info" class="progress-info"></div>
            </div>

            <!-- Блок "На сегодня всё" -->
            <div id="no-words-block" class="practice-container hidden" style="text-align: center;">
                <i class="fas fa-check-circle" style="font-size: 4rem; color: #a05252; margin-bottom: 1rem;"></i>
                <h2>На сегодня все!</h2>
                <p style="margin: 1rem 0; color: #666;">На сегодня нет слов для повторения. Отдохни.</p>
                <div class="button-group">
                    <a href="dashboard.html" class="btn btn-secondary">На главную</a>
                    <a href="add.html" class="btn">Добавить слова</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p><i class="fas fa-heart" style="color: #ff6b6b;"></i> Μπράβο, ρε.</p>
        </div>
    </footer>

    <script>
        const SHEET_ID = '1mFw19dFqAe9C2CMfsNw1SD2WrqD70RDNfKI_niL0Stc';
        const API_KEY = 'AIzaSyADn5OUF_8btAbcsbjMJOgH-ogFL3dwsV8';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3c9yqCbMiw72cXJxoZgb-N4xnhg1vsFwTgRllGTdFbCjIZxGeX-q3-HQinKMPAt7I/exec';

        const STATUS_ORDER = ['new', 'to_learn', 'to_check', '1_day', '2_day', '3_day', '5_day', '8_day', '12_day', '20_day', '30_day', '60_day'];
        const STATUS_INTERVALS = {
            'new': 0,
            'to_learn': 0,
            'to_check': 0,
            '1_day': 1,
            '2_day': 2,
            '3_day': 3,
            '5_day': 5,
            '8_day': 8,
            '12_day': 12,
            '20_day': 20,
            '30_day': 30,
            '60_day': 60
        };

        let todayCards = [];
        let currentCardIndex = 0;
        let currentDirection = '';
        let lastAnswer = null;

        function getTodayString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function addDays(dateString, days) {
            const date = new Date(dateString);
            date.setDate(date.getDate() + days);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function cleanText(text) {
            text = text.replace(/\([^)]*\)/g, '');
            text = text.replace(/\[[^\]]*\]/g, '');
            text = text.replace(/\{[^}]*\}/g, '');
            text = text.replace(/\<[^>]*\>/g, '');
            text = text.replace(/[^\p{L}\s]/gu, '');
            return text.toLowerCase().replace(/\s+/g, ' ').trim();
        }

        async function loadWords() {
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Лист1?key=${API_KEY}`);
                const data = await response.json();

                if (!data.values || data.values.length < 2) return [];

                const headers = data.values[0].map(h => h.trim().toLowerCase());
                const rows = data.values.slice(1);

                return rows.map(row => {
                    const word = {};
                    headers.forEach((header, index) => {
                        word[header] = row[index] || '';
                    });
                    return word;
                });
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                return [];
            }
        }

        async function updateWord(wordId, updates) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wordId, updates })
                });
                console.log('Обновлено:', wordId, updates);
            } catch (error) {
                console.error('Ошибка обновления:', error);
            }
        }

        async function updateDailyWords() {
            const today = getTodayString();
            const words = await loadWords();
            
            const toActivate = words.filter(w => 
                w.status === 'new' && 
                w.first_review === today
            );
            
            for (let word of toActivate) {
                await updateWord(word.id, {
                    status: 'to_learn',
                    next_review: today
                });
            }
            
            return await loadWords();
        }

        async function prepareTodayCards() {
            const words = await updateDailyWords();
            const today = getTodayString();
            
            const cards = [];
            
            // to_learn — 2 карточки
            words.filter(w => w.status === 'to_learn').forEach(word => {
                cards.push({ wordId: word.id, term: word.term, definition: word.definition, status: 'to_learn' });
                cards.push({ wordId: word.id, term: word.term, definition: word.definition, status: 'to_learn' });
            });
            
            // to_check — 1 карточка
            words.filter(w => w.status === 'to_check').forEach(word => {
                cards.push({ wordId: word.id, term: word.term, definition: word.definition, status: 'to_check' });
            });
            
            // остальные с next_review сегодня
            const otherToday = words.filter(w => 
                !['to_learn', 'to_check'].includes(w.status) && 
                w.next_review === today
            );
            
            otherToday.forEach(word => {
                cards.push({ wordId: word.id, term: word.term, definition: word.definition, status: word.status });
            });
            
            return cards.sort(() => Math.random() - 0.5);
        }

        async function handleCorrectAnswer(card) {
            const today = getTodayString();
            let newStatus = '';
            let nextReview = today;

            if (card.status === 'to_learn') {
                newStatus = 'to_check';
                nextReview = today;
            } else if (card.status === 'to_check') {
                newStatus = '1_day';
                nextReview = addDays(today, 1);
            } else {
                const idx = STATUS_ORDER.indexOf(card.status);
                if (idx < STATUS_ORDER.length - 1) {
                    newStatus = STATUS_ORDER[idx + 1];
                } else {
                    newStatus = card.status;
                }
                const days = STATUS_INTERVALS[newStatus] || 0;
                nextReview = days ? addDays(today, days) : today;
            }

            await updateWord(card.wordId, {
                status: newStatus,
                last_reviewed: today,
                next_review: nextReview
            });

            todayCards.splice(currentCardIndex, 1);
            if (todayCards.length === 0) {
                showNoWords();
            } else {
                if (currentCardIndex >= todayCards.length) currentCardIndex = 0;
                showQuestion();
            }
        }

        async function handleIncorrectAnswer(card) {
            const today = getTodayString();
            await updateWord(card.wordId, {
                status: 'to_learn',
                last_reviewed: today,
                next_review: today
            });
            todayCards.splice(currentCardIndex, 1);
            if (todayCards.length === 0) {
                showNoWords();
            } else {
                if (currentCardIndex >= todayCards.length) currentCardIndex = 0;
                showQuestion();
            }
        }

        function showQuestion() {
            if (todayCards.length === 0) {
                showNoWords();
                return;
            }

            const card = todayCards[currentCardIndex];
            currentDirection = Math.random() < 0.5 ? 'term_to_def' : 'def_to_term';
            
            document.getElementById('direction-badge').textContent = 
                currentDirection === 'term_to_def' ? 'Ελληνικά - Русский' : 'Русский - Ελληνικά';
            document.getElementById('prompt').textContent = 
                currentDirection === 'term_to_def' ? card.term : card.definition;
            
            document.getElementById('question-block').classList.remove('hidden');
            document.getElementById('result-block').classList.add('hidden');
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
        }

        function showResult(isCorrect, userAnswer, correctAnswer) {
            const card = todayCards[currentCardIndex];
            
            document.getElementById('question-block').classList.add('hidden');
            document.getElementById('result-block').classList.remove('hidden');
            
            const resultIcon = document.getElementById('result-icon');
            const resultTitle = document.getElementById('result-title');
            
            if (isCorrect) {
                resultIcon.className = 'result-icon correct fas fa-check-circle';
                resultTitle.className = 'correct';
                resultTitle.textContent = 'Правильно! 🎉';
            } else {
                resultIcon.className = 'result-icon incorrect fas fa-times-circle';
                resultTitle.className = 'incorrect';
                resultTitle.textContent = 'Неправильно';
            }
            
            document.getElementById('prompt-word').innerHTML = 
                `<strong>Λέξη (Слово):</strong> ${currentDirection === 'term_to_def' ? card.term : card.definition}`;
            document.getElementById('user-answer').innerHTML = `<strong>Твой ответ:</strong> ${userAnswer}`;
            document.getElementById('correct-answer').innerHTML = `<strong>Правильный ответ:</strong> ${correctAnswer}`;
            
            document.getElementById('progress-info').textContent = `Осталось карточек: ${todayCards.length - currentCardIndex - 1}`;
            
            if (!isCorrect) {
                document.getElementById('fix-button-container').classList.remove('hidden');
                lastAnswer = { card, direction: currentDirection, userAnswer, correctAnswer };
            } else {
                document.getElementById('fix-button-container').classList.add('hidden');
                lastAnswer = null;
            }
        }

        function showNoWords() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('practice-container').classList.remove('hidden');
            document.getElementById('question-block').classList.add('hidden');
            document.getElementById('result-block').classList.add('hidden');
            document.getElementById('no-words-block').classList.remove('hidden');
        }

        async function initPractice() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('practice-container').classList.add('hidden');
            
            todayCards = await prepareTodayCards();
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('practice-container').classList.remove('hidden');
            
            if (todayCards.length === 0) {
                showNoWords();
            } else {
                currentCardIndex = 0;
                showQuestion();
            }
        }

        // Обработчики
        document.getElementById('answer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userAnswer = document.getElementById('answer-input').value;
            const card = todayCards[currentCardIndex];
            const correctAnswer = currentDirection === 'term_to_def' ? card.definition : card.term;
            
            if (cleanText(userAnswer) === cleanText(correctAnswer)) {
                await handleCorrectAnswer(card);
            } else {
                showResult(false, userAnswer, correctAnswer);
            }
        });

        document.getElementById('skip-btn').addEventListener('click', () => {
            currentCardIndex++;
            if (currentCardIndex >= todayCards.length) currentCardIndex = 0;
            showQuestion();
        });

        document.getElementById('continue-btn').addEventListener('click', () => {
            if (todayCards.length > 0) {
                if (currentCardIndex >= todayCards.length) currentCardIndex = 0;
                showQuestion();
            } else {
                showNoWords();
            }
        });

        document.getElementById('fix-btn').addEventListener('click', async () => {
            if (lastAnswer) {
                await handleCorrectAnswer(lastAnswer.card);
                lastAnswer = null;
            }
        });

        initPractice();
    </script>
</body>
</html>
