        .content {

        .page-title {

        th {

        th i.sort-icon {
            position: absolute;

        td {

        tr:hover {

        .word-status {

<body>
    <header class="main-header">
        <h1>
            <i class="fas fa-language"></i>
            Учим греческий
        </h1>
    </header>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-links">
                <a href="dashboard.html"><i class="fas fa-home"></i> Главная</a>
                <a href="dictionary.html"><i class="fas fa-book"></i> Словарь</a>
                <a href="add.html"><i class="fas fa-plus-circle"></i> Добавить</a>
                <a href="practice.html"><i class="fas fa-dumbbell"></i> Тренировка</a>
            </div>
            <a href="index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
        </div>
    </nav>

    <main class="content">
        <h1 class="page-title">
            <i class="fas fa-book-open"></i>
            Словарь
        </h1>
        
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Загрузка слов...
        </div>
        
        <div id="table-container" class="table-container" style="display: none;"></div>
        
        <div id="empty-state" class="empty-state" style="display: none;">
            <i class="fas fa-book-open"></i>
            <p>Словарь пока пустой</p>
            <a href="add.html" class="btn">
                Добавить слова
            </a>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p><i class="fas fa-heart" style="color: #ff6b6b;"></i> Μπράβο, ρε.</p>
        </div>
    </footer>

    <script>
        const SHEET_ID = '1mFw19dFqAe9C2CMfsNw1SD2WrqD70RDNfKI_niL0Stc';
        const API_KEY = 'AIzaSyADn5OUF_8btAbcsbjMJOgH-ogFL3dwsV8';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3c9yqCbMiw72cXJxoZgb-N4xnhg1vsFwTgRllGTdFbCjIZxGeX-q3-HQinKMPAt7I/exec';

        let currentSortColumn = -1;
        let currentSortDirection = 'asc';

        function getTodayString() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        async function loadWords() {
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Лист1?key=${API_KEY}`);
                const data = await response.json();

                if (!data.values || data.values.length < 2) return [];

                const headers = data.values[0].map(h => h.trim().toLowerCase());
                const rows = data.values.slice(1);

                return rows.map(row => {
                    const word = {};
                    headers.forEach((header, index) => {
                        word[header] = row[index] || '';
                    });
                    return word;
                });
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                return [];
            }
        }

        async function updateWord(wordId, updates) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wordId, updates })
                });
            } catch (error) {
                console.error('Ошибка обновления:', error);
            }
        }

        async function updateDailyWords() {
            const today = getTodayString();
            const words = await loadWords();
            
            const toActivate = words.filter(w => 
                w.status === 'new' && 
                w.first_review === today
            );
            
            for (let word of toActivate) {
                await updateWord(word.id, {
                    status: 'to_learn',
                    next_review: today
                });
            }
            
            return await loadWords();
        }

        function displayWords(words) {
            const loading = document.getElementById('loading');
            const tableContainer = document.getElementById('table-container');
            const emptyState = document.getElementById('empty-state');

            loading.style.display = 'none';

            if (words.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            let html = '<table id="dictionary-table"><thead><tr>';
            const displayHeaders = ['term', 'definition', 'status', 'last_reviewed', 'next_review'];
            const headerNames = {
                'term': 'Термин',
                'definition': 'Определение',
                'status': 'Статус',
                'last_reviewed': 'Прошлая проверка',
                'next_review': 'Следующая проверка',
                'first_review': 'Первая проверка',
                'created_at': 'Дата создания'
            };


            displayHeaders.forEach(header => {
                html += `<th onclick="sortTable('${header}')">${headerNames[header]} <i class="fas fa-sort sort-icon"></i></th>`;
            });

            html += '</tr></thead><tbody>';

            words.forEach(word => {
                html += '<tr>';
                displayHeaders.forEach(header => {
                    if (header === 'status') {
                        html += `<td><span class="word-status">${word[header] || ''}</span></td>`;
                    } else if (header === 'created_at' || header === 'first_review') {
                        html += `<td class="date-cell">${word[header] || ''}</td>`;
                    } else {
                        html += `<td>${word[header] || ''}</td>`;
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            tableContainer.innerHTML = html;
            tableContainer.style.display = 'block';
        }

        function sortTable(column) {
            const table = document.getElementById('dictionary-table');
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));

            if (currentSortColumn === column) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortColumn = column;
                currentSortDirection = 'asc';
            }

            rows.sort((a, b) => {
                const aVal = a.children[displayHeaders.indexOf(column)].innerText.trim();
                const bVal = b.children[displayHeaders.indexOf(column)].innerText.trim();
                
                if (aVal < bVal) return currentSortDirection === 'asc' ? -1 : 1;
                if (aVal > bVal) return currentSortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = '';
            rows.forEach(row => tbody.appendChild(row));
        }

        async function initDictionary() {
            const words = await updateDailyWords();
            displayWords(words);
        }

        const displayHeaders = ['term', 'definition', 'status', 'last_reviewed', 'next_review'];
        initDictionary();
    </script>
</body>
